name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Arrange sources for XcodeGen
        run: |
          mkdir -p Sources Resources
          for f in *.swift; do
            [ -f "$f" ] && mv "$f" Sources/ || true
          done
          [ -f index.html ] && mv index.html Resources/ || true
          echo "---- layout ----"
          ls -R Sources Resources

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app (no code signing)
        run: |
          xcodebuild \
            -project PromptLibrary.xcodeproj \
            -scheme PromptLibrary \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package into .ipa
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/PromptLibrary.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"; exit 1
          fi
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qr PromptLibrary.ipa Payload
          rm -rf Payload
          ls -la PromptLibrary.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptLibrary-ipa
          path: PromptLibrary.ipa
          if-no-files-found: error
